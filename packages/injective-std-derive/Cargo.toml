[package]
description = "Procedural macro for injective-std"
edition     = "2021"
license     = "MIT OR Apache-2.0"
name        = "injective-std-derive"
version     = "1.16.4-1"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
proc-macro = true

[dependencies]
cosmwasm-std = { version = "3.0.2", features = ["cosmwasm_1_2", "cosmwasm_1_3", "cosmwasm_1_4", "cosmwasm_2_0", "iterator", "stargate" ] }
itertools    = { version = "0.14.0" }
proc-macro2  = { version = "1.0.40" }
quote        = { version = "1.0.20" }
syn          = { version = "1.0.98" }

[dev-dependencies]
prost    = { version = "0.13.5", features = [ "prost-derive" ] }
serde    = { version = "1.0.196", default-features = false, features = [ "derive" ] }
trybuild = { version = "1.0.63", features = [ "diff" ] }
